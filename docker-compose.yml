version: '3.8'

services:
  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./assets:/app/assets
    env_file:
      - backend/.env
    environment:
      - MONGODB_URI=mongodb://db:27017/campuslens
      - MONGODB_DB_NAME=campuslens
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - EXPO_PUBLIC_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
