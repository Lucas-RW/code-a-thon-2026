<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>CampusLens Graphs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #root {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        .graph-container {
            flex: 1;
            position: relative;
            border-bottom: 1px solid #1e293b;
        }
        .graph-container:last-child {
            border-bottom: none;
        }
        .graph-title {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            pointer-events: none;
            z-index: 10;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .node {
            stroke: #0f172a;
            stroke-width: 1.5;
        }
        .link {
            stroke: #334155;
            stroke-opacity: 0.6;
        }
        .label {
            font-size: 10px;
            fill: #94a3b8;
            pointer-events: none;
            text-anchor: middle;
        }
        /* Animation helpers */
        .power-line, .secondary-line {
            transition: stroke 0.4s ease, stroke-opacity 0.4s ease, stroke-width 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="root">
        <svg id="network-graph"></svg>
        <div id="mini-card" style="display: none;">
            <div class="mini-card-header">
                <span id="mini-type" class="badge"></span>
                <span id="mini-status" class="status-btn">Selected</span>
            </div>
            <div id="mini-title" class="mini-card-title"></div>
            <div id="mini-desc" class="mini-card-desc"></div>
        </div>
    </div>

    <style>
        #mini-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            pointer-events: auto;
            animation: slideUp 0.3s ease-out;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .mini-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            background: #334155;
            color: #94a3b8;
        }
        .status-btn {
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            background: #fbbf24;
            color: #0f172a;
        }
        .status-btn.deselected {
            background: #475569;
            color: #94a3b8;
        }
        .mini-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .mini-card-desc {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.4;
        }
    </style>
    <script src="graph.js"></script>
</body>
</html>
